# Production nginx config for PUG Legal Case Control System.
# Replace pug-legal.example.com + certificate paths before use.
#
# Designed for either:
#   - The docker-compose.prod.yml stack (upstreams = service names), or
#   - A bare-metal deployment where backend/frontend run on the host as systemd
#     services (point upstreams at 127.0.0.1:<port> instead).
#
# TLS certs are managed externally (e.g. certbot --webroot).

worker_processes auto;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 30;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Real IP from a single trusted upstream (the LB or Cloudflare in front).
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    upstream backend  { server backend:8000;  keepalive 16; }
    upstream frontend { server frontend:3000; keepalive 16; }

    # --- 80 -> redirect to 443 ---
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # --- 443 main vhost ---
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name pug-legal.example.com;

        ssl_certificate     /etc/letsencrypt/live/pug-legal.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pug-legal.example.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Belt-and-braces security headers (backend also emits these).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Audit-friendly access log with X-Forwarded-For and request id.
        access_log /var/log/nginx/pug-legal.access.log;
        error_log  /var/log/nginx/pug-legal.error.log warn;

        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
